# ------------------------------------------ RETRIEVAL RELEVANCY ------------------------------------------ #
rr_prompt_template: |
    You are an expert reviewing the RETRIEVED CONTENT.
    Your task is to generate a retrieval relevancy score based on the requirements below:

    ### INSTRUCTIONS ###
            - Read and understand the full meaning of the USER QUERY
            - Read the REFERENCE CONTENT and summarise its key information relevant to the USER QUERY
            - Compare the RETRIEVED CONTENT with the USER QUERY and the REFERENCE CONTENT, and evaluate based on the RUBRICS below:
                - Only generate the score as -1, 0 or 1 or 2 or 3
                - Scoring as -1: if the RETRIEVED CONTENT is much more relevant to the USER QUERY than the REFERENCE CONTENT
                - Scoring as 0: if the RETRIEVED CONTENT is completely irrelevant to the USER QUERY
                - If the REFERENCE CONTENT is strongly relevant to the USER QUERY:
                    - Scoring as 1: if the RETRIEVED CONTENT is relevant to the USER QUERY but doesn't contain any critical information from the REFERENCE CONTENT
                    - Scoring as 2: if the RETRIEVED CONTENT is relevant to the USER QUERY but only partially contains critical information from the REFERENCE CONTENT
                    - Scoring as 3: if the RETRIEVED CONTENT is relevant to the USER QUERY and contains all the critical information from the REFERENCE CONTENT
            - Provide detailed scoring reasons

    ### EXAMPLE OUTPUT FORMAT ###
            {{
                "score": -1,
                "reasoning": "The RETRIEVED CONTENT is much more relevant to the USER QUERY than the REFERENCE CONTENT"
            }}
            {{
                "score": -1,
                "reasoning": "The REFERENCE CONTENT seems irrelevant to the USER QUERY compared to the RETRIEVED CONTENT"
            }}
            {{
                "score": 1,
                "reasoning": "The RETRIEVED CONTENT is relevant to the USER QUERY but doesn't contain any critical information from the REFERENCE CONTENT"
            }}
            {{
                "score": 2,
                "reasoning": "The RETRIEVED CONTENT is relevant to the USER QUERY but only partially contains critical information from the REFERENCE CONTENT"
            }}
            {{
                "score": 3,
                "reasoning": "The RETRIEVED CONTENT is relevant to the USER QUERY and contains all the critical information from the REFERENCE CONTENT"
            }}
            {{
                "score": 0,
                "reasoning": "The RETRIEVED CONTENT is completely irrelevant to the USER QUERY"
            }}

    ### OUTPUT REQUIREMENTS ###
    - Make sure your output reasoning is brief but comprehensive, covering all key points that justify your score
    - Try to make output reasoning with no more than 200 tokens if you can

    Here is the USER QUERY:
    {user_query}

    Here is the REFERENCE CONTENT:
    {reference_content}

    Here is the RETRIEVED CONTENT:
    {retrieved_content}

    Your evaluation should follow this format:
    {format_instructions}
# ------------------------------------------ RETRIEVAL RELEVANCY ------------------------------------------ #

# ------------------------------------------ QUERY RELEVANCY ------------------------------------------ #
qr_prompt_template: |
    You are an expert evaluating whether a retrieved text chunk is relevant to a user query.
    Your task is to generate a query relevancy score based on the requirements below:

    ### INSTRUCTIONS ###
            - Read and understand the full meaning of the USER QUERY
            - Read the RETRIEVED CHUNK carefully
            - Evaluate how well the RETRIEVED CHUNK addresses or relates to the USER QUERY based on the RUBRICS below:
                - Only generate the score as 0, 1, 2 or 3
                - Scoring as 0: the RETRIEVED CHUNK is completely irrelevant to the USER QUERY
                - Scoring as 1: the RETRIEVED CHUNK is loosely related to the USER QUERY topic but does not contain useful information to answer it
                - Scoring as 2: the RETRIEVED CHUNK is relevant to the USER QUERY and contains partial information useful for answering it
                - Scoring as 3: the RETRIEVED CHUNK is highly relevant and contains sufficient information to fully or mostly answer the USER QUERY
            - Provide brief scoring reasons

    ### EXAMPLE OUTPUT FORMAT ###
            {{
                "score": 0,
                "reasoning": "The chunk discusses an unrelated topic with no connection to the query."
            }}
            {{
                "score": 1,
                "reasoning": "The chunk is about the same general topic but does not address the specific question."
            }}
            {{
                "score": 2,
                "reasoning": "The chunk contains partial information relevant to answering the query."
            }}
            {{
                "score": 3,
                "reasoning": "The chunk directly addresses the query with sufficient detail to answer it."
            }}

    ### OUTPUT REQUIREMENTS ###
    - Keep output reasoning brief but comprehensive, covering key points that justify your score
    - Aim for no more than 100 tokens in the reasoning

    Here is the USER QUERY:
    {user_query}

    Here is the RETRIEVED CHUNK:
    {retrieved_chunk}

    Your evaluation should follow this format:
    {format_instructions}
# ------------------------------------------ QUERY RELEVANCY ------------------------------------------ #
