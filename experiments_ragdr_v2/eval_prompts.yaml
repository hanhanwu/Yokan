# ------------------------------------------ RETRIEVAL QUALITY ------------------------------------------ #
rq_prompt_template: |
    You are an expert reviewing the RETRIEVED CONTENT. 
    Your task is to generate a retrieval quality score based on the requirements below:

    ### INSTRUCTIONS ###
            - Read and understand the full meaning of the USER QUERY
            - Read the CONTEXT and summary its key information relevant to the USER QUERY
            - Compare the RETRIEVED CONTENT with the USER QUERY and the CONTEXT, and evaluate based on the RUBRICS below:
                - Only generate the score as -1, 0 or 1 or 2 or 3
                - Scoring as -1: if the RETRIEVED CONTENT is much more relevant to the USER QUERY than the CONTEXT
                - Scoring as 0: if the RETRIEVED CONTENT is completely irrelevant to the USER QUERY
                - If the CONTEXT is strongly relevant to the USER QUERY:
                    - Scoring as 1: if the RETRIEVED CONTENT is relevant to the USER QUERY but doesn't contain any critical information from the CONTEXT
                    - Scoring as 2: if the RETRIEVED CONTENT is relevant to the USER QUERY but only partially contains critical information from the CONTEXT
                    - Scoring as 3: if the RETRIEVED CONTENT is relevant to USER QUERY and contains all the critical information from the CONTEXT
            - Provide detailed scoring reasons

    ### EXAMPLE OUTPUT FORMAT ###
            {{
                "score": -1,
                "reasoning": "The RETRIEVED CONTENT is much more relevant to the USER QUERY than the CONTEXT"
            }}
            {{
                "score": -1,
                "reasoning": "The CONTEXT seems irrelevant to the USER QUERY compared to the RETRIEVED CONTENT"
            }}
            {{
                "score": 1,
                "reasoning": "The RETRIEVED CONTENT is relevant to the USER QUERY but doesn't contain any critical information from the CONTEXT"
            }}
            {{
                "score": 2,
                "reasoning": "The RETRIEVED CONTENT is relevant to the USER QUERY but only partially contains critical information from the CONTEXT"
            }}
            {{
                "score": 3,
                "reasoning": "The RETRIEVED CONTENT is relevant to the USER QUERY and contains all the critical information from the CONTEXT"
            }}
            {{
                "score": 0,
                "reasoning": "The RETRIEVED CONTENT is completely irrelevant to the USER QUERY"
            }}

    ### OUTPUT Requirements ###
    - Make sure your output reasoning is brief but comprehensive, covering all key points that justify your score
    - Try to make output reasoning with no more than 200 tokens if you can


    Here is the USER QUERY:
    {user_query}

    Here is the CONTEXT:
    {context}

    Here is the RETRIEVED CONTENT:
    {retrieved_content}

    Your evaluation should follow this format:
    {format_instructions}
# ------------------------------------------ RETRIEVAL QUALITY ------------------------------------------ #


# ------------------------------------------ ANSWER QUALITY ------------------------------------------ #
aq_prompt_template: |
    You are an expert reviewing the quality of AI's ANSWER.
    Your task is to generate an answer quality score based on the requirements below:

    ### INSTRUCTIONS ###
            - Read and understand the full meaning of the USER QUERY
            - Read the REFERENCED ANSWER and summary its key information relevant to the USER QUERY
            - Compare the AI's ANSWER with the USER QUERY and the REFERENCED ANSWER, and evaluate based on the RUBRICS below:
                - Only generate the score as -1, 0 or 1 or 2 or 3
                - Scoring as -1: if the AI's ANSWER is much more relevant to the USER QUERY than the REFERENCED ANSWER
                - Scoring as 0: if the AI's ANSWER is completely irrelevant to the USER QUERY
                - If the REFERENCED ANSWER is strongly relevant to the USER QUERY:
                    - Scoring as 0: if AI's ANSWER is significantly conflict with the REFERENCED ANSWER
                    - Scoring as 1: if the AI's ANSWER is relevant to the USER QUERY but doesn't contain any critical information from the REFERENCED ANSWER
                    - Scoring as 2: if the AI's ANSWER is relevant to the USER QUERY but only partially contains critical information from the REFERENCED ANSWER
                    - Scoring as 3: if the AI's ANSWER is relevant to USER QUERY and contains all the critical information from the REFERENCED ANSWER
            - Provide detailed scoring reasons

    ### EXAMPLE OUTPUT FORMAT ###
            {{
                "score": -1,
                "reasoning": "The AI's ANSWER is much more relevant to the USER QUERY than the REFERENCED ANSWER"
            }}
            {{
                "score": -1,
                "reasoning": "The REFERENCED ANSWER seems irrelevant to the USER QUERY compared to the AI's ANSWER"
            }}
            {{
                "score": 3,
                "reasoning": "AI's ANSWER is not only relevant to the USER QUERY, but also contains all critical info mentioned in the REFERENCED ANSWER"
            }}
            {{
                "score": 2,
                "reasoning": "AI's ANSWER is relevant to the USER QUERY, while it contains some critial info mentioned in the REFERENCED ANSWER, it's missing other critical info"
            }}
            {{
                "score": 1,
                "reasoning": "AI's ANSWER seems relevant to the USER QUERY, but comparing with the REFERENCED ANSWER, it's completely inaccurate"
            }}
            {{
                "score": 0,
                "reasoning": "AI's ANSWER is completely irrelevant to the USER QUERY"
            }}
            {{
                "score": 0,
                "reasoning": "The REFERENCED ANSWER is strongly relevant to the USER QUERY, the AI's ANSWER is strongly conflicting with the REFERENCED ANSWER"
            }}


    ### OUTPUT Requirements ###
    - Make sure your output reasoning is brief but comprehensive, covering all key points that justify your score
    - Try to make output reasoning with no more than 200 tokens if you can


    Here is the USER QUERY:
    {user_query}

    Here is the AI's ANSWER:
    {ai_answer}

    Here is the REFERENCED ANSWER:
    {referenced_answer}

    Your evaluation should follow this format:
    {format_instructions}
# ------------------------------------------ ANSWER QUALITY ------------------------------------------ #


# ------------------------------------------ SCORE AFTER REVIEW ------------------------------------------ #
review_reasoning_prompt_template: |
    You are reviewing the reasoning text, responsible for generating the score based on score definition and the reasoning text.

    ### SCORE DEFINITION ###
    - Score as -1 means: AI's output is much more relevant than the referenced information.
    - Score as 0 means: AI's output is completely irrelevant to the user query. 
    - Score as 1 means: AI's output has low value to the user query.
    - Score as 2 means: AI's output partially covers the critical information in the referenced information, but still missing other critical information.
    - Score as 3 means: AI's output contains all the critical information in the referenced information.

    ### REVIEW INSTRUCTIONS ###
    - Review the REASONING TEXT, comparing with the SCORE DEFINITION, generate an the score align with the SCORE DEFINITION
    - Only generate an integer score in [-1, 0, 1, 2, 3]
    - Output MUST follow this format:
        {{
            "score_after_review": int
        }}

    ### EXAMPLEOUTPUT ###
        {{
            "score_after_review": -1
        }}
        {{
            "score_after_review": 0
        }}

    Here is the REASONING TEXT:
    {eval_reasoning}

    Your output should follow this format:
    {format_instructions}
# ------------------------------------------ SCORE AFTER REVIEW ------------------------------------------ #


# ------------------------------------------ TEXT ALIGNMENT ------------------------------------------ #
review_text_alignment_template: |
    You're reviewing TEXT_A and TEXT_B to see whether their critical information align.

        ### REVIEW INSTRUCTIONS ###
        - Understand "critical information" means key information that can impact the USER QUERY.
        - Check whether TEXT_B covers all the critical information mentioned in TEXT_A. If so, score as 1, meaning aligned.
        - If TEXT_A has critical information that's never mentioned in TEXT_B, score as 0, meaning misalignment.
        - If TEXT_A has critical information conflicts with TEXT_B, score as 0, meaning misalignment.
        - Only generate an integer score as 1 or 0:
          - Score 1 means TEXT_A and TEXT_B are aligned.
          - Score 0 means TEXT_A and TEXT_B are misaligned.
        - Explain the reasons of your judgement.

        ### EXAMPLE OUTPUT FORMAT ###
            {{
                "text_alignment_score": 1
                "reasoning": "The TEXT_B covers all the critical information mentioned in TEXT_A, so they are aligned."
            }}
            {{

                "text_alignment_score": 1
                "reasoning": "The TEXT_A contains some extra information never mentioned in TEXT_B but such information has low impact to the USER QUERY, so they are aligned."
            }}
            {{
                "text_alignment_score": 0
                "reasoning": "The TEXT_A contains a good amount of critical information never mentioned in TEXT_B, so they are misaligned."
            }}
            {{
                "text_alignment_score": 0
                "reasoning": "The TEXT_A contains critical information that conflicts with TEXT_B, so they are misaligned."
            }}
            

        Here is the USER QUERY:
        {user_query}

        Here is the TEXT_A:
        {text_a}

        Here is the TEXT_B:
        {text_b}

        Your output should follow this format:
        {format_instructions}
# ------------------------------------------ TEXT ALIGNMENT ------------------------------------------ #


# ------------------------------------------ QUERY QUALITY ------------------------------------------ #
review_query_quality_template: |
    You're reviewing the USER_QUERY and judge its quality.

        ### REVIEW INSTRUCTIONS ###
        - ONLY return "clear" or "ambiguous" as the query quality score:
          - "clear" means the USER QUERY is clear and specific, without ambiguity.
          - "ambiguous" means the USER QUERY is ambiguous, with unclear intent or multiple interpretations.
          - Don't return any other values.

        ### EXAMPLE OUTPUT FORMAT ###
            {{
                "query_quality": "clear",

            }}
            {{
                "query_quality": "ambiguous",
            }}
            

        Here is the USER QUERY:
        {user_query}

        Your output should follow this format:
        {format_instructions}
# ------------------------------------------ QUERY QUALITY ------------------------------------------ #


# ------------------------------------------ QUERY EXPANSION ------------------------------------------ #
query_expansion_template: |
    The USER_QUERY is ambiguous. Rewrite it into 1 to 3 clearer, specific query variants.

    ### INSTRUCTIONS ###
    - Each variant should resolve ambiguity by assuming a distinct plausible intent.
    - Keep each variant concise and self-contained.
    - Generate only 1 to 3 variants, less tokens is better if they can cover the ambiguity.

    ### EXAMPLE OUTPUT ###
        {{
            "query_variants": [
                "What was Amazon's net revenue in fiscal year 2022?",
                "What were Amazon's total operating expenses in 2022?"
            ]
        }}

    Here is the USER_QUERY:
    {user_query}

    Your output should follow this format:
    {format_instructions}
# ------------------------------------------ QUERY EXPANSION ------------------------------------------ #


# ------------------------------------------ REVIEW RAG SYSTEM ------------------------------------------ #
review_rag_system_template: |
    ### INSTRUCTIONS ###
        The RAG pipeline is built by LlamaIndex tools. All the user queries are clear.
        Look at the AVERAGE_RETRIEVAL_QUALITY_SCORE and a list of RETRIEVAL_QUALITY_REASONS.
        Also look at the AVERAGE_ANSWER_QUALITY_SCORE and a list of ANSWER_QUALITY_REASONS.
        
        Then review RAG pipeline's details, include:
            - The SYSTEM_PROMPT that guides LlamaIndex's RetrieverQueryEngine.
            - The RAG pipeline's config is covered in RAG_CONFIG

        Look at all the details, and explain potential root causes of why there're answer quality scores lower than 3.
        Also provide suggestions to help improve the RAG pipeline's performance.

    ### OUTPUT FORMAT ###
        {{
            "root_cause_analysis": "Explanation of potential root causes",
            "improvement_suggestions": "Suggestions to improve RAG pipeline performance"
        }}
        - Make sure the text in root_cause_analysis is brief but comprehensive, less than 30 tokens if you can.
        - Make sure improvement_suggestions is actionable and specific, use bullet point for each suggestion, each bullet point is less than 30 tokens if you can.

    ### EXAMPLE OUTPUT ###
        {{
            "root_cause_analysis": "There are more score 1 and 0 in answer quality scores, which is mainly caused by low retrieval quality.",
            "improvement_suggestions": "Suggest to change to:
                                    - change to a better embedding model
                                    - increase the weight of semantic similarity score in the retrieval process
                                    So that retrieved documents can be more relevant to the user query."
        }}


    Here is the AVERAGE_RETRIEVAL_QUALITY_SCORE:
    {avg_rq_score}

    Here is the RETRIEVAL_QUALITY_REASONS:
    {rq_reasons}

    Here is the AVERAGE_ANSWER_QUALITY_SCORE:
    {avg_aq_score}

    Here is the ANSWER_QUALITY_REASONS:
    {aq_reasons}

    Here is the SYSTEM_PROMPT used in the RAG pipeline:
    {system_prompt}

    Here is the RAG pipeline's config:
    {rag_config}

    Your output should follow this format:
    {format_instructions}
# ------------------------------------------ REVIEW RAG SYSTEM ------------------------------------------ #


# ------------------------------------------ COMPARE 2 RAGs WITHOUT BACKGROUND ------------------------------------------ #
compare_2rags_template_v1: |
    ### RESPONSIBILITIES ###
        You're an expert of RAG system.
        You're responsible for comparing 2 RAG pipelines built by LlamaIndex tools, RAG1 and RAG2, and explain the reasons behind the difference of their performance.
        
    ### INSTRUCTIONS ###
        * Compare RAG1_SETTINGS and RAG2_SETTINGS, find out the differences in their system design.
        * Look at RAG1_RETRIEVAL_QUALITY_SCORE_AND_REASONS and RAG2_RETRIEVAL_QUALITY_SCORE_AND_REASONS, analyze the reasons behind their retrieval quality performance.
        * Look at RAG1_ANSWER_QUALITY_SCORE_AND_REASONS and RAG2_ANSWER_QUALITY_SCORE_AND_REASONS, analyze the reasons behind their answer quality performance.
        * Then explain the potential root causes of the diferences of their performance.
        * For cases with answer quality score in [0, 1, 2], explain the potential root causes.

    ### OUTPUT FORMAT ###
        {{
            "score_difference_root_causes": "Explanation of potential root causes of score differences between RAG1 and RAG2",
            "lower_answer_quality_root_causes": "Explanation of potential root causes of answer quality scores in [0, 1, 2] in RAG1 or RAG2",
        }}
        - Make sure the text in score_difference_root_causes is brief but comprehensive, less than 50 tokens if you can.
        - Make sure lower_answer_quality_root_causes is brief but comprehensive, less than 50 tokens if you can.

    ### EXAMPLE OUTPUT ###
        {{
            "score_difference_root_causes": "RAG 2 uses better LLM for answer genration, that's why answer quality got higher score.",
            "lower_answer_quality_root_causes": "The LLM used for answer generation is limited."
        }}

        {{
            "score_difference_root_causes": "RAG 1 uses better embedding more and higher weights for semantic search, that's why its retrieval quality is higher.
                                             But its answer quality is lower can be caused by the randoness of the LLM used for answer generation.",
            "lower_answer_quality_root_causes": "The attention mechanism in the LLM has higher randomness."
        }}


    Here is the RAG1_SETTINGS:
    {rag1_settings}

    Here is the RAG1_RETRIEVAL_QUALITY_SCORE_AND_REASONS:
    {rag1_rq_score_and_reasons}

    Here is the RAG1_ANSWER_QUALITY_SCORE_AND_REASONS:
    {rag1_aq_score_and_reasons}

    Here is the RAG2_SETTINGS:
    {rag2_settings}

    Here is the RAG2_RETRIEVAL_QUALITY_SCORE_AND_REASONS:
    {rag2_rq_score_and_reasons}

    Here is the RAG2_ANSWER_QUALITY_SCORE_AND_REASONS:
    {rag2_aq_score_and_reasons}

    Your output should follow this format:
    {format_instructions}
# ------------------------------------------ COMPARE 2 RAGs WITHOUT BACKGROUND ------------------------------------------ #