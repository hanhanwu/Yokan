dataset:
  name: fiqa
  hf_dataset: explodinggradients/fiqa
  hf_config: ragas_eval
  hf_split: baseline
  # Keep the POC quick; raise this when you want a larger cached index.
  sample_limits: [25, 100]
  active_sample_limit: 25

chunking:
  methods: [fixed_words, sentence_window, paragraph, sliding_sentence]
  active_method: fixed_words
  chunk_sizes: [80, 120, 220]
  active_chunk_size: 120
  chunk_overlaps: [20, 40]
  active_chunk_overlap: 20

embeddings:
  # sklearn-hashing: fully local, no install needed.
  # sentence-transformers/*: free, downloads model on first use (pip install sentence-transformers).
  # openai:*: requires OPENAI_API_KEY env var (pip install openai).
  models:
    - sklearn-hashing
    - sentence-transformers/all-MiniLM-L6-v2
    - sentence-transformers/multi-qa-MiniLM-L6-cos-v1
    - sentence-transformers/all-mpnet-base-v2
    - openai:text-embedding-3-small
    - openai:text-embedding-ada-002
  active_model: sklearn-hashing
  dimensions:
    sklearn-hashing: 384
    sentence-transformers/all-MiniLM-L6-v2: 384
    sentence-transformers/multi-qa-MiniLM-L6-cos-v1: 384
    sentence-transformers/all-mpnet-base-v2: 768
    openai:text-embedding-3-small: 512
    openai:text-embedding-ada-002: 1536

hybrid_search:
  semantic_weights: [0.30, 0.40, 0.60, 0.75, 0.90]
  active_semantic_weight: 0.60
  keyword_weights: [0.10, 0.25, 0.40, 0.60, 0.70]
  active_keyword_weight: 0.40
  top_k_values: [3, 5, 7, 10]
  active_top_k: 3

answer_generation:
  methods: [extractive, groq:openai/gpt-oss-20b]
  active_method: groq:openai/gpt-oss-20b

cache:
  index_dir: data/cache
